name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate Gradle Wrapper
        working-directory: android-app
        run: gradle wrapper --gradle-version 8.9 --distribution-type bin

      - name: Build installable debug APK
        working-directory: android-app
        run: ./gradlew --no-daemon clean assembleDebug

      - name: Prepare APK and checksum
        run: |
          mkdir -p apk
          cp android-app/app/build/outputs/apk/debug/app-debug.apk \
            apk/phone-motion-dino-controller-v0.1.0-debug.apk
          sha256sum apk/phone-motion-dino-controller-v0.1.0-debug.apk \
            > apk/phone-motion-dino-controller-v0.1.0-debug.apk.sha256

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: phone-motion-dino-controller-v0.1.0-debug
          path: |
            apk/phone-motion-dino-controller-v0.1.0-debug.apk
            apk/phone-motion-dino-controller-v0.1.0-debug.apk.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Commit APK and Gradle Wrapper to repository
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            android-app/gradlew \
            android-app/gradlew.bat \
            android-app/gradle/wrapper/gradle-wrapper.jar \
            android-app/gradle/wrapper/gradle-wrapper.properties \
            apk/phone-motion-dino-controller-v0.1.0-debug.apk \
            apk/phone-motion-dino-controller-v0.1.0-debug.apk.sha256
          if git diff --cached --quiet; then
            echo "No generated files changed."
          else
            git commit -m "Build installable Android APK [skip ci]"
            git push
          fi
