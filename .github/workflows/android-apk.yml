name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate Gradle Wrapper
        working-directory: android-app
        run: gradle wrapper --gradle-version 8.9 --distribution-type bin

      - name: Build installable debug APK
        id: build
        working-directory: android-app
        shell: bash
        run: |
          mkdir -p ../apk
          set +e
          ./gradlew --no-daemon clean assembleDebug 2>&1 | tee ../apk/gradle-build.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Prepare APK and checksum
        if: steps.build.outputs.exit_code == '0'
        run: |
          cp android-app/app/build/outputs/apk/debug/app-debug.apk \
            apk/phone-motion-dino-controller-v0.1.0-debug.apk
          sha256sum apk/phone-motion-dino-controller-v0.1.0-debug.apk \
            > apk/phone-motion-dino-controller-v0.1.0-debug.apk.sha256

      - name: Verify APK signature and manifest metadata
        if: steps.build.outputs.exit_code == '0'
        run: |
          "${ANDROID_HOME}/build-tools/35.0.0/apksigner" verify \
            --verbose --print-certs \
            apk/phone-motion-dino-controller-v0.1.0-debug.apk \
            | tee apk/apksigner-verify.txt
          "${ANDROID_HOME}/build-tools/35.0.0/aapt" dump badging \
            apk/phone-motion-dino-controller-v0.1.0-debug.apk \
            | tee apk/apk-badging.txt

      - name: Upload APK as workflow artifact
        if: steps.build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: phone-motion-dino-controller-v0.1.0-debug
          path: |
            apk/phone-motion-dino-controller-v0.1.0-debug.apk
            apk/phone-motion-dino-controller-v0.1.0-debug.apk.sha256
            apk/apksigner-verify.txt
            apk/apk-badging.txt
          if-no-files-found: error
          retention-days: 90

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-build-log
          path: apk/gradle-build.log
          if-no-files-found: error
          retention-days: 30

      - name: Commit APK and Gradle Wrapper to repository
        if: github.event_name == 'push' && steps.build.outputs.exit_code == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            android-app/gradlew \
            android-app/gradlew.bat \
            android-app/gradle/wrapper/gradle-wrapper.jar \
            android-app/gradle/wrapper/gradle-wrapper.properties \
            apk/phone-motion-dino-controller-v0.1.0-debug.apk \
            apk/phone-motion-dino-controller-v0.1.0-debug.apk.sha256 \
            apk/apksigner-verify.txt \
            apk/apk-badging.txt
          if git diff --cached --quiet; then
            echo "No generated files changed."
          else
            git commit -m "Build installable Android APK [skip ci]"
            git push
          fi

      - name: Fail workflow when Gradle build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
