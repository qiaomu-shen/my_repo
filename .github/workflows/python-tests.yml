name: Python receiver tests

on:
  push:
    paths:
      - "receiver/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "receiver/**"
      - ".github/workflows/python-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: receiver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests -v
      - run: python -m py_compile dino_receiver.py send_test_jump.py
